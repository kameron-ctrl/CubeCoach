version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: cubecoach
      POSTGRES_PASSWORD: cubecoach
      POSTGRES_DB: cubecoach
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://cubecoach:cubecoach@db:5432/cubecoach
      SECRET_KEY: supersecretkey
    depends_on:
      - db
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app

volumes:
  pgdata:
